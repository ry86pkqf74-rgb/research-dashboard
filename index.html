<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="sharepoint-site" content="https://emory.sharepoint.com/sites/GeneralSurgery">
    <title>Emory General Surgery Research Workflow Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide React Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- MSAL.js for Microsoft 365 SSO Authentication -->
    <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
    
    <style>
        /* Emory Branding Colors */
        :root {
            --emory-navy: #012169;
            --emory-gold: #B58500;
            --emory-white: #FFFFFF;
            --emory-light-gray: #F5F5F5;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: var(--emory-light-gray);
        }
        
        .emory-navy {
            background-color: var(--emory-navy);
        }
        
        .emory-navy-text {
            color: var(--emory-navy);
        }
        
        .emory-gold {
            color: var(--emory-gold);
        }
        
        .emory-gold-bg {
            background-color: var(--emory-gold);
        }
        
        .nav-item-active {
            border-left: 4px solid var(--emory-gold);
            background-color: rgba(181, 133, 0, 0.1);
        }
        
        .stat-card {
            border-top: 4px solid var(--emory-gold);
        }
        
        .btn-primary {
            background-color: var(--emory-navy);
            color: white;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background-color: var(--emory-gold);
        }
        
        .btn-secondary {
            border: 2px solid var(--emory-navy);
            color: var(--emory-navy);
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background-color: var(--emory-navy);
            color: white;
        }
        
        .slide-panel {
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .toast {
            animation: slideInToast 0.3s ease;
        }
        
        @keyframes slideInToast {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .loading-spinner {
            border: 4px solid rgba(1, 33, 105, 0.2);
            border-top-color: var(--emory-navy);
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <!-- MSAL Authentication Service (runs before React/Babel) -->
    <script>
        /**
         * MSAL Authentication Service for Microsoft 365 SSO
         * Provides seamless authentication for Emory users accessing SharePoint data
         * from the externally hosted dashboard (GitHub Pages).
         *
         * When running inside SharePoint (cookie auth), this is bypassed.
         * When running outside SharePoint, MSAL handles token acquisition.
         */
        window.MSALAuthService = (function() {
            const SHAREPOINT_SITE = 'https://emory.sharepoint.com/sites/GeneralSurgery';

            // MSAL Configuration
            // NOTE: To enable full SSO, register an Azure AD app at https://portal.azure.com
            // Required: Single-page application redirect URI = your GitHub Pages URL
            // Required API permissions: Sites.Read.All, User.Read, Group.Read.All
            const msalConfig = {
                auth: {
                    // Default: Microsoft common endpoint (works for any Microsoft account)
                    // Replace with your registered Azure AD App Client ID for full SSO
                    clientId: window.MSAL_CLIENT_ID || '00000000-0000-0000-0000-000000000000',
                    authority: window.MSAL_AUTHORITY || 'https://login.microsoftonline.com/emory.edu',
                    redirectUri: window.location.origin + window.location.pathname,
                    postLogoutRedirectUri: window.location.origin + window.location.pathname,
                },
                cache: {
                    cacheLocation: 'sessionStorage',
                    storeAuthStateInCookie: false,
                },
                system: {
                    loggerOptions: {
                        logLevel: 0, // Error only
                    }
                }
            };

            const loginRequest = {
                scopes: ['https://emory.sharepoint.com/.default']
            };

            const graphRequest = {
                scopes: ['User.Read', 'Group.Read.All']
            };

            let msalInstance = null;
            let currentAccount = null;
            let isInitialized = false;
            let initError = null;

            // Initialize MSAL
            async function initialize() {
                try {
                    if (typeof msal === 'undefined') {
                        initError = 'MSAL library not loaded';
                        return false;
                    }

                    // Skip MSAL if no real client ID configured
                    if (msalConfig.auth.clientId === '00000000-0000-0000-0000-000000000000') {
                        initError = 'no_client_id';
                        isInitialized = false;
                        return false;
                    }

                    msalInstance = new msal.PublicClientApplication(msalConfig);
                    await msalInstance.initialize();

                    // Handle redirect response
                    const response = await msalInstance.handleRedirectPromise();
                    if (response) {
                        currentAccount = response.account;
                    } else {
                        const accounts = msalInstance.getAllAccounts();
                        if (accounts.length > 0) {
                            currentAccount = accounts[0];
                        }
                    }

                    isInitialized = true;
                    return true;
                } catch (error) {
                    console.warn('MSAL initialization failed:', error);
                    initError = error.message;
                    return false;
                }
            }

            // Sign in with popup
            async function signIn() {
                if (!msalInstance) return null;
                try {
                    const response = await msalInstance.loginPopup(graphRequest);
                    currentAccount = response.account;
                    return currentAccount;
                } catch (error) {
                    console.error('Sign in failed:', error);
                    return null;
                }
            }

            // Sign out
            async function signOut() {
                if (!msalInstance || !currentAccount) return;
                await msalInstance.logoutPopup({ account: currentAccount });
                currentAccount = null;
            }

            // Get access token for SharePoint
            async function getSharePointToken() {
                if (!msalInstance || !currentAccount) return null;
                try {
                    const response = await msalInstance.acquireTokenSilent({
                        ...loginRequest,
                        account: currentAccount
                    });
                    return response.accessToken;
                } catch (error) {
                    // Silent token acquisition failed, try popup
                    try {
                        const response = await msalInstance.acquireTokenPopup(loginRequest);
                        return response.accessToken;
                    } catch (popupError) {
                        console.error('Token acquisition failed:', popupError);
                        return null;
                    }
                }
            }

            // Get access token for Microsoft Graph
            async function getGraphToken() {
                if (!msalInstance || !currentAccount) return null;
                try {
                    const response = await msalInstance.acquireTokenSilent({
                        ...graphRequest,
                        account: currentAccount
                    });
                    return response.accessToken;
                } catch (error) {
                    try {
                        const response = await msalInstance.acquireTokenPopup(graphRequest);
                        return response.accessToken;
                    } catch (popupError) {
                        console.error('Graph token acquisition failed:', popupError);
                        return null;
                    }
                }
            }

            // Get current user info from Graph API
            async function getCurrentUser() {
                const token = await getGraphToken();
                if (!token) return null;
                try {
                    const response = await fetch('https://graph.microsoft.com/v1.0/me', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (response.ok) return await response.json();
                    return null;
                } catch (e) {
                    return null;
                }
            }

            // Get user's group memberships from Graph API
            async function getUserGroups() {
                const token = await getGraphToken();
                if (!token) return [];
                try {
                    const response = await fetch('https://graph.microsoft.com/v1.0/me/memberOf', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        return data.value.map(g => g.displayName).filter(Boolean);
                    }
                    return [];
                } catch (e) {
                    return [];
                }
            }

            // Make authenticated SharePoint REST API call
            async function fetchSharePoint(endpoint, options = {}) {
                const token = await getSharePointToken();
                if (!token) throw new Error('No SharePoint access token');

                const headers = {
                    'Accept': 'application/json;odata=verbose',
                    'Content-Type': 'application/json;odata=verbose',
                    'Authorization': 'Bearer ' + token,
                    ...(options.headers || {})
                };

                const response = await fetch(endpoint, { ...options, headers });
                if (!response.ok) {
                    throw new Error('SharePoint API error: ' + response.status);
                }
                return await response.json();
            }

            return {
                initialize,
                signIn,
                signOut,
                getSharePointToken,
                getGraphToken,
                getCurrentUser,
                getUserGroups,
                fetchSharePoint,
                get isInitialized() { return isInitialized; },
                get currentAccount() { return currentAccount; },
                get initError() { return initError; },
                SHAREPOINT_SITE
            };
        })();

        // Auto-initialize MSAL on page load
        window.MSALAuthService.initialize().then(ok => {
            console.log('MSAL init:', ok ? 'success' : window.MSALAuthService.initError);
        });
    </script>

    <script type="text/babel">
        // ========================================
        // UTILITY FUNCTIONS
        // ========================================
        
        /**
         * Fetch wrapper for SharePoint REST API calls
         * Includes proper headers for CORS and authentication
         */
        const fetchSharePoint = async (endpoint, options = {}) => {
            const defaultHeaders = {
                'Accept': 'application/json',
                'Content-Type': 'application/json',
            };

            // If running outside SharePoint with MSAL, add Bearer token
            if (!isSharePointContext() && isMSALAuthenticated()) {
                try {
                    const token = await window.MSALAuthService.getSharePointToken();
                    if (token) {
                        defaultHeaders['Authorization'] = `Bearer ${token}`;
                    }
                } catch (e) {
                    console.warn('Could not get MSAL token for SharePoint:', e);
                }
            }

            const config = {
                ...options,
                headers: {
                    ...defaultHeaders,
                    ...options.headers,
                },
                credentials: isSharePointContext() ? 'include' : undefined,
            };

            try {
                const response = await fetch(endpoint, config);
                if (!response.ok) {
                    throw new Error(`SharePoint API error: ${response.status} ${response.statusText}`);
                }
                return await response.json();
            } catch (error) {
                console.error('SharePoint API call failed:', error);
                throw error;
            }
        };
        
        /**
         * Parse REST API endpoint for list items
         */
        const buildListEndpoint = (listName, filters = '', selects = '') => {
            const baseUrl = 'https://emory.sharepoint.com/sites/GeneralSurgery';
            let endpoint = `${baseUrl}/_api/web/lists/getByTitle('${listName}')/items`;
            
            if (filters || selects) {
                const params = [];
                if (filters) params.push(`$filter=${filters}`);
                if (selects) params.push(`$select=${selects}`);
                endpoint += `?${params.join('&')}`;
            }
            
            return endpoint;
        };
        
        // ========================================
        // TOAST NOTIFICATION SYSTEM
        // ========================================
        
        const ToastContext = React.createContext();
        
        const useToast = () => {
            const context = React.useContext(ToastContext);
            if (!context) {
                throw new Error('useToast must be used within ToastProvider');
            }
            return context;
        };
        
        const Toast = ({ message, type, onClose }) => {
            React.useEffect(() => {
                const timer = setTimeout(onClose, 4000);
                return () => clearTimeout(timer);
            }, [onClose]);
            
            const bgColor = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
            
            return (
                <div className={`toast fixed top-4 right-4 ${bgColor} text-white px-6 py-3 rounded-lg shadow-lg z-50`}>
                    {message}
                </div>
            );
        };
        
        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = React.useState([]);
            
            const addToast = React.useCallback((message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
            }, []);
            
            const removeToast = React.useCallback((id) => {
                setToasts(prev => prev.filter(t => t.id !== id));
            }, []);
            
            return (
                <ToastContext.Provider value={{ addToast, removeToast }}>
                    {children}
                    <div className="fixed top-4 right-4 z-50 pointer-events-none">
                        {toasts.map(toast => (
                            <Toast
                                key={toast.id}
                                message={toast.message}
                                type={toast.type}
                                onClose={() => removeToast(toast.id)}
                            />
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };
        
        // ========================================
        // ICONS (using lucide-react CDN)
        // ========================================
        
        const Icon = ({ name, size = 24, className = '' }) => {
            // Using lucide icons from CDN
            const iconMap = {
                'menu': '☰',
                'x': '✕',
                'user': '👤',
                'settings': '⚙️',
                'document': '📄',
                'calendar': '📅',
                'check': '✓',
                'alert': '⚠️',
                'download': '⬇️',
                'plus': '+',
                'edit': '✎',
                'trash': '🗑️',
                'search': '🔍',
                'send': '→',
                'loader': '⟳',
            };
            
            return <span className={className}>{iconMap[name] || '•'}</span>;
        };
        
        // ========================================
        // SHAREPOINT INTEGRATION HELPERS
        // ========================================
        
        /**
         * Detects if code is running in SharePoint context
         */
        const isSharePointContext = () => {
            return typeof window !== 'undefined' && typeof window._spPageContextInfo !== 'undefined';
        };

        /**
         * Check if MSAL authentication is available and user is signed in
         */
        const isMSALAuthenticated = () => {
            return window.MSALAuthService && window.MSALAuthService.isInitialized && window.MSALAuthService.currentAccount;
        };

        /**
         * Gets current user from SharePoint context or MSAL
         */
        const getSharePointUser = async () => {
            try {
                // Path 1: Running inside SharePoint (cookie auth)
                if (isSharePointContext()) {
                    const userDisplayName = window._spPageContextInfo.userDisplayName;
                    const userLoginName = window._spPageContextInfo.userLoginName;
                    return { displayName: userDisplayName, loginName: userLoginName };
                }

                // Path 2: Running externally with MSAL auth
                if (isMSALAuthenticated()) {
                    const graphUser = await window.MSALAuthService.getCurrentUser();
                    if (graphUser) {
                        return {
                            displayName: graphUser.displayName,
                            loginName: graphUser.userPrincipalName || graphUser.mail,
                        };
                    }
                }

                return null;
            } catch (error) {
                console.error('Error getting user:', error);
                return null;
            }
        };

        /**
         * Detects user role from SharePoint group membership or MSAL Graph groups
         */
        const detectSharePointRole = async () => {
            try {
                // Path 1: Running inside SharePoint (cookie auth)
                if (isSharePointContext()) {
                    const siteUrl = window._spPageContextInfo.webServerRelativeUrl;
                    const response = await fetch(`${siteUrl}/_api/web/currentuser/groups`, {
                        method: 'GET',
                        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                        credentials: 'include',
                    });

                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                    const data = await response.json();
                    const groups = data.value.map(g => g.Title);

                    if (groups.includes('Research_Admins')) return 'Admin';
                    if (groups.includes('Research_Mentors')) return 'Mentor';
                    if (groups.includes('Research_Residents')) return 'Resident';
                    return null;
                }

                // Path 2: Running externally with MSAL auth
                if (isMSALAuthenticated()) {
                    const groups = await window.MSALAuthService.getUserGroups();

                    // Check Azure AD / Microsoft 365 group names
                    const groupNames = groups.map(g => g.toLowerCase());
                    if (groupNames.some(g => g.includes('research') && g.includes('admin'))) return 'Admin';
                    if (groupNames.some(g => g.includes('research') && g.includes('mentor'))) return 'Mentor';
                    if (groupNames.some(g => g.includes('research') && g.includes('resident'))) return 'Resident';

                    // Default to Resident for authenticated Emory users
                    const account = window.MSALAuthService.currentAccount;
                    if (account && account.username && account.username.includes('emory.edu')) {
                        return 'Resident';
                    }
                    return null;
                }

                return null;
            } catch (error) {
                console.error('Error detecting role:', error);
                return null;
            }
        };
        
        /**
         * SharePoint REST API helper - with proper request digest for POST operations
         */
        const getRequestDigest = async () => {
            try {
                if (!isSharePointContext()) {
                    return null;
                }
                
                const siteUrl = window._spPageContextInfo.webServerRelativeUrl;
                const response = await fetch(`${siteUrl}/_api/contextinfo`, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                return data.FormDigestValue;
            } catch (error) {
                console.error('Error getting request digest:', error);
                return null;
            }
        };
        
        /**
         * Create list item in SharePoint with proper headers
         */
        const createSharePointListItem = async (listName, itemData) => {
            try {
                if (!isSharePointContext()) {
                    console.warn('Not in SharePoint context, skipping item creation');
                    return null;
                }
                
                const digest = await getRequestDigest();
                const siteUrl = window._spPageContextInfo.webServerRelativeUrl;
                
                const response = await fetch(`${siteUrl}/_api/web/lists/getbytitle('${listName}')/items`, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json',
                        'X-RequestDigest': digest,
                    },
                    body: JSON.stringify(itemData),
                    credentials: 'include',
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                return await response.json();
            } catch (error) {
                console.error('Error creating SharePoint list item:', error);
                throw error;
            }
        };
        
        // ========================================
        // SHARED COMPONENTS
        // ========================================
        
        /**
         * Navigation Bar - Top header with Emory branding
         */
        const NavBar = ({ currentUser, currentRole, onRoleChange }) => {
            const [showRoleMenu, setShowRoleMenu] = React.useState(false);
            
            const roles = ['Resident', 'Mentor', 'Admin'];
            
            return (
                <nav className="emory-navy text-white shadow-lg sticky top-0 z-40">
                    <div className="flex items-center justify-between px-6 py-4">
                        <div className="flex items-center gap-4">
                            <h1 className="text-2xl font-bold">Emory General Surgery</h1>
                            <span className="text-sm emory-gold font-semibold">Research Dashboard</span>
                        </div>
                        
                        <div className="flex items-center gap-6">
                            {/* Role Selector */}
                            <div className="relative">
                                <button
                                    onClick={() => setShowRoleMenu(!showRoleMenu)}
                                    className="flex items-center gap-2 px-4 py-2 rounded hover:bg-opacity-80 transition"
                                    style={{ backgroundColor: 'rgba(255,255,255,0.1)' }}
                                >
                                    {currentRole}
                                    <Icon name="menu" size={16} />
                                </button>
                                
                                {showRoleMenu && (
                                    <div className="absolute right-0 mt-2 w-40 bg-white text-gray-800 rounded-lg shadow-lg z-50">
                                        {roles.map(role => (
                                            <button
                                                key={role}
                                                onClick={() => {
                                                    onRoleChange(role);
                                                    setShowRoleMenu(false);
                                                }}
                                                className={`block w-full text-left px-4 py-2 hover:bg-gray-100 transition ${
                                                    role === currentRole ? 'bg-yellow-100 emory-gold-text' : ''
                                                }`}
                                            >
                                                {role}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                            
                            {/* User Avatar and Name */}
                            <div className="flex items-center gap-3 border-l border-white border-opacity-30 pl-6">
                                <div className="w-10 h-10 bg-yellow-400 rounded-full flex items-center justify-center font-bold emory-navy-text">
                                    {currentUser.substring(0, 1).toUpperCase()}
                                </div>
                                <span className="text-sm">{currentUser}</span>
                            </div>
                        </div>
                    </div>
                </nav>
            );
        };
        
        /**
         * Permission Notice Banner
         */
        const PermissionBanner = () => (
            <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mx-4 mt-4 rounded">
                <div className="flex gap-3">
                    <Icon name="alert" className="text-blue-500 text-xl" />
                    <p className="text-sm text-gray-700">
                        You are viewing documents you have permission to access. Contact admin for access issues.
                    </p>
                </div>
            </div>
        );
        
        /**
         * Loading Spinner
         */
        const LoadingSpinner = () => (
            <div className="flex items-center justify-center py-8">
                <div className="loading-spinner w-8 h-8"></div>
            </div>
        );
        
        /**
         * Empty State
         */
        const EmptyState = ({ icon, title, message }) => (
            <div className="flex flex-col items-center justify-center py-12 text-gray-500">
                <div className="text-4xl mb-4">{icon}</div>
                <h3 className="font-semibold text-lg text-gray-700">{title}</h3>
                <p className="text-gray-500 mt-1">{message}</p>
            </div>
        );
        
        /**
         * Stat Card - Reusable component for dashboard statistics
         */
        const StatCard = ({ icon, label, value, trend }) => (
            <div className="stat-card bg-white rounded-lg p-6 shadow-sm border border-gray-200">
                <div className="flex items-center justify-between mb-2">
                    <span className="text-2xl">{icon}</span>
                    {trend && <span className={`text-sm font-semibold ${trend > 0 ? 'text-green-600' : 'text-red-600'}`}>
                        {trend > 0 ? '+' : ''}{trend}%
                    </span>}
                </div>
                <p className="text-gray-600 text-sm">{label}</p>
                <p className="text-3xl font-bold emory-navy-text mt-1">{value}</p>
            </div>
        );
        
        /**
         * Modal/Slide-out Panel Component
         */
        const SlidePanel = ({ isOpen, title, children, onClose, width = 'w-96' }) => {
            if (!isOpen) return null;
            
            return (
                <>
                    {/* Overlay */}
                    <div
                        className="fixed inset-0 bg-black bg-opacity-50 z-40"
                        onClick={onClose}
                    />
                    
                    {/* Panel */}
                    <div className={`slide-panel fixed right-0 top-0 bottom-0 ${width} bg-white shadow-2xl z-50 flex flex-col overflow-hidden`}>
                        {/* Header */}
                        <div className="emory-navy text-white px-6 py-4 flex items-center justify-between">
                            <h2 className="text-xl font-bold">{title}</h2>
                            <button
                                onClick={onClose}
                                className="p-1 hover:bg-white hover:bg-opacity-20 rounded transition"
                            >
                                <Icon name="x" size={24} />
                            </button>
                        </div>
                        
                        {/* Content */}
                        <div className="flex-1 overflow-y-auto px-6 py-4">
                            {children}
                        </div>
                    </div>
                </>
            );
        };
        
        /**
         * Form Input Component
         */
        const FormInput = ({ label, type = 'text', value, onChange, placeholder, required = false }) => (
            <div className="mb-4">
                <label className="block text-sm font-semibold text-gray-700 mb-2">
                    {label}
                    {required && <span className="text-red-500 ml-1">*</span>}
                </label>

                                            <div key={cycle.CycleKey} className="border border-gray-200 rounded-lg p-4 hover:shadow-md transition">

                                                    <span className="px-3 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-800">
                                                        {cycle.LOIStatus}
                                                    </span>
                                                </div>
                                                <p className="text-sm text-gray-600 mb-2">{cycle.ProjectOverview}</p>
                                                <div className="flex gap-4 text-sm text-gray-500">
                                                    <span>Type: {cycle.ResearchPlanType}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <EmptyState icon="📚" title="No Research Cycles" message="Start by submitting a new LOI." />
                                )}
                            </div>
                        </div>
                    )}
                    
                    {/* LOI Submission Panel */}
                    <SlidePanel
                        isOpen={loiPanelOpen}
                        title="Submit New Letter of Intent"
                        onClose={() => setLoiPanelOpen(false)}
                    >
                        <div className="space-y-4 pb-6">
                            <FormSelect
                                label="Research Plan Type"
                                value={loiForm.ResearchPlanType}
                                onChange={(val) => setLoiForm({...loiForm, ResearchPlanType: val})}
                                options={['Basic Science', 'Clinical', 'Translational', 'Quality Improvement']}
                                required
                            />
                            
                            <FormInput
                                label="Project Title"
                                value={loiForm.ProjectTitle}
                                onChange={(val) => setLoiForm({...loiForm, ProjectTitle: val})}
                                placeholder="Enter project title"
                                required
                            />
                            
                            <FormInput
                                label="Reason for Research"
                                type="textarea"
                                value={loiForm.ReasonForResearch}
                                onChange={(val) => setLoiForm({...loiForm, ReasonForResearch: val})}
                                placeholder="Explain the rationale..."
                            />
                            
                            <FormInput
                                label="Project Overview"
                                type="textarea"
                                value={loiForm.ProjectOverview}
                                onChange={(val) => setLoiForm({...loiForm, ProjectOverview: val})}
                                placeholder="Provide project overview..."
                            />
                            
                            <FormInput
                                label="Background & Significance"
                                type="textarea"
                                value={loiForm.BackgroundSignificance}
                                onChange={(val) => setLoiForm({...loiForm, BackgroundSignificance: val})}
                                placeholder="Background and significance..."
                            />
                            
                            <FormInput
                                label="Central Hypothesis"
                                type="textarea"
                                value={loiForm.CentralHypothesis}

                            />
                            
                            <FormInput
                                label="Specific Aims Summary"
                                type="textarea"
                                value={loiForm.SpecificAimsSummary}

                                placeholder="Summarize your specific aims..."

                            <FormSelect
                                label="Advanced Degree Interest"
                                value={loiForm.AdvancedDegreeInterest}

                            <button

                                <Icon name="send" className="mr-2" /> Submit LOI

                        </div>
                    </SlidePanel>
                    
                    {/* Review Submission Panel */}
                    <SlidePanel
                        isOpen={reviewPanelOpen}

                        onClose={() => setReviewPanelOpen(false)}
                    >
                        <div className="space-y-4 pb-6">
                            <FormSelect
                                label="Review Type"
                                value={reviewForm.ReviewType}
                                onChange={(val) => setReviewForm({...reviewForm, ReviewType: val})}
                                options={['Semi-Annual', 'Year-End']}
                                required
                            />
                            
                            <FormInput
                                label="Progress Overview"
                                type="textarea"
                                value={reviewForm.ProgressOverview}
                                onChange={(val) => setReviewForm({...reviewForm, ProgressOverview: val})}
                                placeholder="Describe your progress..."
                                required
                            />
                            
                            <FormInput
                                label="Publications"
                                type="textarea"
                                value={reviewForm.Publications}
                                onChange={(val) => setReviewForm({...reviewForm, Publications: val})}
                                placeholder="List publications..."
                            />
                            
                            <FormInput
                                label="Patents & IP"
                                type="textarea"

                                onChange={(val) => setReviewForm({...reviewForm, Patents: val})}
                                placeholder="Patents and intellectual property..."
                            />
                            
                            <FormInput
                                label="Honors & Awards"
                                type="textarea"
                                value={reviewForm.HonorsAwards}
                                onChange={(val) => setReviewForm({...reviewForm, HonorsAwards: val})}
                                placeholder="Honors and awards received..."
                            />
                            
                            <FormInput
                                label="Meetings Attended"
                                type="textarea"
                                value={reviewForm.MeetingsAttended}
                                onChange={(val) => setReviewForm({...reviewForm, MeetingsAttended: val})}
                                placeholder="Professional meetings attended..."
                            />
                            
                            <FormInput
                                label="Seminars Presented"
                                type="textarea"
                                value={reviewForm.SeminarsPresented}
                                onChange={(val) => setReviewForm({...reviewForm, SeminarsPresented: val})}
                                placeholder="Seminars and presentations..."
                            />
                            
                            <FormInput
                                label="Upcoming Goals"
                                type="textarea"
                                value={reviewForm.UpcomingGoals}
                                onChange={(val) => setReviewForm({...reviewForm, UpcomingGoals: val})}
                                placeholder="Goals for next period..."
                            />
                            
                            <FormInput
                                label="Anticipated Publications"
                                type="textarea"
                                value={reviewForm.AnticipatedPublications}
                                onChange={(val) => setReviewForm({...reviewForm, AnticipatedPublications: val})}
                                placeholder="Expected publications..."
                            />
                            
                            <FormInput
                                label="Funding Applications Planned"
                                type="textarea"
                                value={reviewForm.FundingApplicationsPlanned}
                                onChange={(val) => setReviewForm({...reviewForm, FundingApplicationsPlanned: val})}
                                placeholder="Planned funding applications..."
                            />
                            
                            <FormInput
                                label="Career Goals"
                                type="textarea"
                                value={reviewForm.CareerGoals}
                                onChange={(val) => setReviewForm({...reviewForm, CareerGoals: val})}
                                placeholder="Long-term career aspirations..."
                            />
                            
                            <button
                                onClick={handleReviewSubmit}
                                className="w-full btn-primary px-4 py-3 rounded-lg font-semibold transition mt-6"
                            >
                                <Icon name="send" className="mr-2" /> Submit Review
                            </button>
                        </div>
                    </SlidePanel>
                    
                    {/* Extension Request Panel */}
                    <SlidePanel
                        isOpen={extensionPanelOpen}
                        title="Request Research Cycle Extension"
                        onClose={() => setExtensionPanelOpen(false)}
                        width="w-full md:w-2/3"
                    >
                        <div className="p-6">
                            <ExtensionRequestForm
                                onClose={() => setExtensionPanelOpen(false)}
                                onSubmit={(data) => {
                                    console.log('Extension request submitted:', data);
                                    // Refresh data after submission
                                    loadData();
                                }}
                                currentUser={currentUser}
                            />
                        </div>
                    </SlidePanel>
                    
                    {/* AI Writing Assistant */}
                    <AIWritingAssistant onInsert={(text) => {
                        if (loiPanelOpen) {
                            setLoiForm({...loiForm, ProjectOverview: text});
                        } else if (reviewPanelOpen) {
                            setReviewForm({...reviewForm, ProgressOverview: text});
                        }
                    }} />
                </div>
            );
        };
        
        // ========================================
        // MENTOR DASHBOARD
        // ========================================
        
        const MentorDashboard = ({ currentUser }) => {
            const [residents, setResidents] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const toast = useToast();
            
            React.useEffect(() => {
                const loadData = async () => {
                    try {
                        setLoading(true);
                        
                        // Mock mentor data
                        setResidents([
                            {
                                ResidentKey: 'RES001',
                                ResidentName: 'Dr. Smith',
                                ProjectTitle: 'Novel Surgical Technique',
                                LOIStatus: 'Approved',
                                PGYLevel: 'PGY-2',
                            },
                            {
                                ResidentKey: 'RES002',
                                ResidentName: 'Dr. Johnson',
                                ProjectTitle: 'Clinical Outcomes Study',
                                LOIStatus: 'Under Review',
                                PGYLevel: 'PGY-3',
                            },
                        ]);
                        
                        toast.addToast('Mentor data loaded', 'success');
                    } catch (error) {
                        toast.addToast('Error loading mentor data', 'error');
                    } finally {
                        setLoading(false);
                    }
                };
                
                loadData();
            }, [toast]);
            
            if (loading) return <LoadingSpinner />;
            
            return (
                <div className="max-w-7xl mx-auto">
                    <PermissionBanner />
                    
                    {/* Welcome Banner */}
                    <div className="emory-navy text-white rounded-lg shadow-lg p-8 m-4 mt-6">
                        <h1 className="text-3xl font-bold mb-2">Welcome, {currentUser}</h1>
                        <p className="text-lg opacity-90">Research Mentor Dashboard</p>
                    </div>
                    
                    {/* Stats */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mx-4 my-6">
                        <StatCard icon="👥" label="Assigned Residents" value={residents.length} />
                        <StatCard icon="📋" label="Pending Reviews" value="2" />
                        <StatCard icon="📊" label="Active Projects" value={residents.length} />
                    </div>
                    
                    {/* My Residents Table */}
                    <div className="mx-4 mb-8 bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                        <div className="p-6 border-b border-gray-200">
                            <h2 className="text-xl font-bold emory-navy-text">My Residents</h2>
                        </div>
                        
                        <table className="w-full">
                            <thead className="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th className="px-6 py-3 text-left text-sm font-semibold text-gray-700">Resident</th>
                                    <th className="px-6 py-3 text-left text-sm font-semibold text-gray-700">PGY Level</th>
                                    <th className="px-6 py-3 text-left text-sm font-semibold text-gray-700">Project</th>
                                    <th className="px-6 py-3 text-left text-sm font-semibold text-gray-700">Status</th>
                                    <th className="px-6 py-3 text-left text-sm font-semibold text-gray-700">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {residents.map((res) => (
                                    <tr key={res.ResidentKey} className="border-b border-gray-200 hover:bg-gray-50 transition">
                                        <td className="px-6 py-3 text-sm font-semibold text-gray-900">{res.ResidentName}</td>
                                        <td className="px-6 py-3 text-sm text-gray-600">{res.PGYLevel}</td>
                                        <td className="px-6 py-3 text-sm text-gray-600">{res.ProjectTitle}</td>
                                        <td className="px-6 py-3 text-sm">
                                            <span className={`px-2 py-1 rounded-full text-xs font-semibold ${
                                                res.LOIStatus === 'Approved' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'
                                            }`}>
                                                {res.LOIStatus}
                                            </span>
                                        </td>
                                        <td className="px-6 py-3 text-sm text-blue-600 font-semibold cursor-pointer hover:text-blue-800">
                                            Review
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };
        
        // ========================================
        // ADMIN DASHBOARD
        // ========================================
        
        const AdminDashboard = ({ currentUser }) => {
            const [stats, setStats] = React.useState({
                totalResidents: 12,
                activeCycles: 8,
                documentsThisMonth: 24,
                pendingApprovals: 3,
            });
            const [flows, setFlows] = React.useState([
                { name: 'LOI Submission Flow', status: 'running' },
                { name: 'Document Generation Flow', status: 'running' },
                { name: 'Review Notification Flow', status: 'running' },
                { name: 'AI Assistant Integration', status: 'warning' },
                { name: 'Email Reminder Flow', status: 'running' },
                { name: 'Report Generation Flow', status: 'running' },
                { name: 'Archive & Backup Flow', status: 'running' },
                { name: 'User Access Sync Flow', status: 'running' },
            ]);
            const [loading, setLoading] = React.useState(true);
            const toast = useToast();
            
            React.useEffect(() => {
                const loadData = async () => {
                    try {
                        setLoading(true);
                        toast.addToast('Admin dashboard loaded', 'success');
                    } catch (error) {
                        toast.addToast('Error loading admin data', 'error');
                    } finally {
                        setLoading(false);
                    }
                };
                
                loadData();
            }, [toast]);
            
            if (loading) return <LoadingSpinner />;
            
            return (
                <div className="max-w-7xl mx-auto">
                    <PermissionBanner />
                    
                    {/* Welcome Banner */}
                    <div className="emory-navy text-white rounded-lg shadow-lg p-8 m-4 mt-6">
                        <h1 className="text-3xl font-bold mb-2">Admin Dashboard</h1>
                        <p className="text-lg opacity-90">System Overview & Management</p>
                    </div>
                    
                    {/* Overview Stats */}
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mx-4 my-6">
                        <StatCard icon="👥" label="Total Residents" value={stats.totalResidents} trend={5} />
                        <StatCard icon="🔄" label="Active Cycles" value={stats.activeCycles} trend={2} />
                        <StatCard icon="📄" label="Documents (This Month)" value={stats.documentsThisMonth} trend={12} />
                        <StatCard icon="⏳" label="Pending Approvals" value={stats.pendingApprovals} trend={-1} />
                    </div>
                    
                    {/* Flow Health Monitor */}
                    <div className="mx-4 mb-8 bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                        <div className="p-6 border-b border-gray-200">
                            <h2 className="text-xl font-bold emory-navy-text">Power Automate Flow Health Monitor</h2>
                        </div>
                        
                        <div className="p-6 space-y-3">
                            {flows.map((flow, idx) => (
                                <div key={idx} className="flex items-center justify-between p-4 border border-gray-200 rounded-lg hover:bg-gray-50 transition">
                                    <span className="font-semibold text-gray-900">{flow.name}</span>
                                    <div className="flex items-center gap-2">

                                            flow.status === 'running' ? 'bg-green-500' : flow.status === 'warning' ? 'bg-yellow-500' : 'bg-red-500'

                                            flow.status === 'running' ? 'text-green-700' : flow.status === 'warning' ? 'text-yellow-700' : 'text-red-700'

                                        <button className="ml-4 text-blue-600 hover:text-blue-800 font-semibold text-sm">
                                            View Details
                                        </button>

                    </div>
                    
                    {/* Quick Actions */}
                    <div className="mx-4 mb-8 bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                        <h2 className="text-xl font-bold emory-navy-text mb-4">Quick Actions</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <button className="btn-primary px-4 py-3 rounded-lg font-semibold transition">
                                <Icon name="settings" className="mr-2" /> Manage SharePoint Lists
                            </button>
                            <button className="btn-primary px-4 py-3 rounded-lg font-semibold transition">
                                <Icon name="settings" className="mr-2" /> Access Power Automate
                            </button>
                            <button className="btn-primary px-4 py-3 rounded-lg font-semibold transition">
                                <Icon name="document" className="mr-2" /> View Template Library
                            </button>
                            <button className="btn-primary px-4 py-3 rounded-lg font-semibold transition">
                                <Icon name="download" className="mr-2" /> Download System Report
                            </button>
                        </div>
                    </div>
                    
                    {/* Recent Activity Feed */}
                    <div className="mx-4 mb-8 bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                        <div className="p-6 border-b border-gray-200">
                            <h2 className="text-xl font-bold emory-navy-text">Recent Activity (Last 20 Items)</h2>
                        </div>
                        
                        <div className="p-6 space-y-3">
                            {[...Array(5)].map((_, idx) => (
                                <div key={idx} className="flex items-center gap-4 p-3 border-l-4 border-blue-500 bg-blue-50 rounded">
                                    <span className="text-2xl">📄</span>
                                    <div className="flex-1">
                                        <p className="font-semibold text-gray-900">LOI Submission - Dr. Smith</p>
                                        <p className="text-sm text-gray-600">{new Date().toLocaleDateString()}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };
        
        // ========================================
        // MAIN APPLICATION COMPONENT
        // ========================================
        
        /**
         * Sign-In Banner shown when MSAL is configured but user hasn't signed in
         */
        const MSALSignInBanner = ({ onSignIn }) => {
            const [signingIn, setSigningIn] = React.useState(false);
            const auth = window.MSALAuthService;

            // Don't show if MSAL not configured or already authenticated or in SharePoint
            if (isSharePointContext() || !auth || auth.initError === 'no_client_id') return null;
            if (auth.isInitialized && auth.currentAccount) return null;

            const handleSignIn = async () => {
                setSigningIn(true);
                const account = await auth.signIn();
                setSigningIn(false);
                if (account && onSignIn) onSignIn();
            };

            return (
                <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mx-4 mt-4 rounded-r-lg">
                    <div className="flex items-center justify-between">
                        <div>
                            <p className="text-blue-800 font-semibold text-sm">Connect to Emory SharePoint</p>
                            <p className="text-blue-600 text-xs mt-1">
                                Sign in with your Emory Microsoft 365 account for live data access. Currently viewing demo data.
                            </p>
                        </div>
                        <button
                            onClick={handleSignIn}
                            disabled={signingIn}
                            className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700 disabled:opacity-50"
                        >
                            {signingIn ? 'Signing in...' : 'Sign in with Microsoft'}
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentRole, setCurrentRole] = React.useState('Resident');
            const [currentUser, setCurrentUser] = React.useState('Dr. Sarah Johnson');
            const [authMode, setAuthMode] = React.useState('demo'); // 'demo', 'sharepoint', 'msal'

            /**
             * Detect user role from SharePoint context, MSAL, or use manual selector
             */
            const detectUserRole = React.useCallback(async () => {
                try {
                    // Try to get user info from SharePoint or MSAL
                    const spUser = await getSharePointUser();
                    if (spUser) {
                        setCurrentUser(spUser.displayName);
                        setAuthMode(isSharePointContext() ? 'sharepoint' : 'msal');

                        // Try to detect role
                        const detectedRole = await detectSharePointRole();
                        if (detectedRole) {
                            setCurrentRole(detectedRole);
                            console.log(`Role detected: ${detectedRole} for user: ${spUser.displayName}`);
                            return;
                        }
                    }

                    // Fallback to demo mode with manual role selector
                    setAuthMode('demo');
                    console.log('Role detection: using demo mode with manual selector');
                } catch (error) {
                    console.error('Error detecting user role:', error);
                    setAuthMode('demo');
                }
            }, []);

            React.useEffect(() => {
                detectUserRole();
            }, [detectUserRole]);

            return (
                <div className="min-h-screen bg-gray-100">
                    <NavBar
                        currentUser={currentUser}
                        currentRole={currentRole}
                        onRoleChange={setCurrentRole}
                    />

                    {/* MSAL Sign-In Banner (only shows when MSAL is configured but not signed in) */}
                    <MSALSignInBanner onSignIn={detectUserRole} />

                    {currentRole === 'Resident' && <ResidentDashboard currentUser={currentUser} />}
                    {currentRole === 'Mentor' && <MentorDashboard currentUser={currentUser} />}
                    {currentRole === 'Admin' && <AdminDashboard currentUser={currentUser} />}

                    {/* Footer */}
                    <footer className="bg-gray-800 text-white py-6 mt-12 border-t border-gray-700">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                <div className="text-center md:text-left">
                                    <p className="text-sm">Emory General Surgery Research Workflow Dashboard</p>
                                    <p className="text-xs text-gray-400 mt-1">Built with React & Tailwind CSS • SharePoint Integrated</p>
                                </div>
                                <div className="text-center md:text-right">
                                    <p className="text-xs text-gray-400">
                                        v2.1 • {authMode === 'sharepoint' ? 'SharePoint Connected' : authMode === 'msal' ? 'Microsoft 365 Connected' : 'Demo Mode'}
                                    </p>
                                    <p className="text-xs text-gray-400 mt-1">Emory University School of Medicine</p>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };
        
        // ========================================
        // RENDER APPLICATION
        // ========================================
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ToastProvider>
                <App />
            </ToastProvider>
        );
    </script>
</body>
</html>
